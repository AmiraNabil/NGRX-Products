<ng-container *ngIf="!(loading$ | async)">
  <div class="row g-3">
    <div
      class="col-lg-3 col-md-4 col-sm-6"
      *ngFor="let product of products$ | async; trackBy: trackById"
    >
      <div class="card">
        <img
          [src]="
            !product?.images?.[0] || product?.images?.[0]?.includes('placehold.co')
              ? 'https://placehold.net/4.png'
              : product?.images?.[0]
          "
          class="card-img-top"
          [alt]="product?.title"
        />
        <div class="card-body d-flex flex-column">
          <span class="badge text-bg-dark w-50 p-2 text-truncate">
            {{ product?.category?.name }}</span
          >
          <h6 class="card-title text-truncate fw-bold pt-3">{{ product?.title }}</h6>
          <p class="card-text text-success fw-bold fs-5 mb-3">${{ product?.price }}</p>
          <div class="d-flex gap-2">
            <button class="btn btn-outline-dark rounded-5 flex-grow-1" (click)="onEdit(product)">
              <i class="fa-solid fa-pen"></i> Edit
            </button>
            <button class="btn btn-danger rounded-5 flex-grow-1" (click)="onDelete(product)">
              <i class="fa-solid fa-trash"></i> Delete
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</ng-container>

<div class="row g-3" *ngIf="loading$ | async">
  <div class="col-lg-3 col-md-4 col-sm-6" *ngFor="let i of [1, 2, 3, 4, 5, 6, 7, 8]">
    <div class="card">
      <ngx-skeleton-loader
        [theme]="{
          height: '355px',
          width: '100%',
          margin: '0',
          display: 'block',
          'border-radius': '4px 4px 0 0',
        }"
      >
      </ngx-skeleton-loader>

      <div class="card-body d-flex flex-column">
        <ngx-skeleton-loader
          [theme]="{
            height: '24px',
            width: '50%',
            'border-radius': '20px',
            margin: '0 0 12px 0',
          }"
        >
        </ngx-skeleton-loader>

        <ngx-skeleton-loader
          [theme]="{
            height: '18px',
            width: '90%',
            'border-radius': '4px',
            margin: '0 0 8px 0',
          }"
        >
        </ngx-skeleton-loader>

        <ngx-skeleton-loader
          [theme]="{
            height: '24px',
            width: '35%',
            'border-radius': '4px',
            margin: '0 0 16px 0',
          }"
        >
        </ngx-skeleton-loader>

        <div class="d-flex gap-2">
          <ngx-skeleton-loader
            [theme]="{
              height: '38px',
              width: '100%',
              'border-radius': '50px',
              margin: '0',
            }"
          >
          </ngx-skeleton-loader>
          <ngx-skeleton-loader
            [theme]="{
              height: '38px',
              width: '100%',
              'border-radius': '50px',
              margin: '0',
            }"
          >
          </ngx-skeleton-loader>
        </div>
      </div>
    </div>
  </div>
</div>
