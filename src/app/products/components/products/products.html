<div class="d-flex" style="min-height: 100vh">
  <div class="flex-grow-1 d-flex flex-column">
    <div
      class="d-flex justify-content-between align-items-center px-4 py-3 bg-white border-bottom shadow-sm"
    >
      <h5 class="mb-0 fw-bold">
        <i class="fa-solid fa-box me-2 text-primary"></i>
        Products List
      </h5>
      <button class="btn btn-primary rounded-4 px-3 py-2" (click)="goToAdd()">
        <i class="fa-solid fa-plus me-1"></i> Add Product
      </button>
    </div>

    <div class="p-4 flex-grow-1 bg-light">
      <app-product-list (editClicked)="onEditClicked($event)"> </app-product-list>
    </div>
  </div>
</div>
