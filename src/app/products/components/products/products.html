<div class="d-flex" style="min-height: 100vh">
  <div class="flex-grow-1 d-flex flex-column">
    <div
      class="d-flex justify-content-between align-items-center px-4 py-3 bg-white border-bottom shadow-sm"
    >
      <h5 class="mb-0 fw-bold">
        <i class="fa-solid fa-box me-2 text-primary" *ngIf="view === 'list'"></i>
        <i class="fa-solid fa-pen-to-square me-2 text-primary" *ngIf="view === 'form'"></i>
        {{ view === 'list' ? 'Products List' : 'Product Form' }}
      </h5>
      <button class="btn btn-primary btn-sm" *ngIf="view === 'list'" (click)="showForm()">
        <i class="fa-solid fa-plus me-1"></i> Add Product
      </button>
    </div>

    <div class="p-4 flex-grow-1 bg-light">
      <app-product-list *ngIf="view === 'list'" (editClicked)="onEditClicked($event)">
      </app-product-list>
    </div>
  </div>
</div>
